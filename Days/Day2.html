<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day 2 - Pūrvāṅgam: Vighna-Nivāraṇa</title>
    <style>
        :root { 
            --primary: #e67e22; --secondary: #2c3e50; --sidebar-bg: #1a252f; 
            --bg: #fdfaf6; --card-bg: #ffffff; --text-main: #34495e; --accent-soft: #fcf3ea;
        }

        body { font-family: 'Segoe UI', Roboto, sans-serif; margin: 0; display: flex; height: 100vh; background: var(--bg); color: var(--text-main); overflow: hidden; }

        /* --- Sidebar Formatting Fix --- */
        .sidebar { width: 320px; background: var(--sidebar-bg); color: white; display: flex; flex-direction: column; flex-shrink: 0; box-shadow: 4px 0 15px rgba(0,0,0,0.2); }
        .sidebar-brand { padding: 30px 20px; font-weight: 800; font-size: 1.1rem; letter-spacing: 1px; color: var(--primary); background: rgba(0,0,0,0.3); border-bottom: 1px solid rgba(255,255,255,0.05); text-align: center; }
        #dynamic-links { flex-grow: 1; overflow-y: auto; padding: 15px 0; }
        
        .nav-item { display: block; padding: 18px 25px; color: rgba(255,255,255,0.5); text-decoration: none; border-left: 4px solid transparent; transition: all 0.3s ease; border-bottom: 1px solid rgba(255,255,255,0.03); }
        .nav-item:hover { background: rgba(255,255,255,0.05); color: #fff; }
        .nav-item.active { background: rgba(230, 126, 34, 0.12); color: var(--primary); border-left-color: var(--primary); }
        .nav-item.active .day-name { color: #fff; font-weight: 600; }
        
        .day-num { font-size: 0.7rem; display: block; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; opacity: 0.8; }
        .day-name { font-size: 0.95rem; display: block; line-height: 1.4; }

        /* --- Content Layout --- */
        .content-wrapper { flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; }
        header { background: white; padding: 25px 40px; border-bottom: 1px solid #ddd; position: sticky; top: 0; z-index: 10; display: flex; align-items: center; justify-content: space-between; }
        header h1 { margin: 0; font-size: 1.4rem; color: var(--secondary); font-weight: 700; }

        .video-container { width: 92%; max-width: 950px; margin: 25px auto; }
        .video-toggle-btn { width: 100%; background: var(--secondary); color: white; padding: 16px 20px; border: none; border-radius: 8px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-weight: 700; transition: 0.3s; }
        .video-toggle-btn:hover { background: #34495e; }
        .video-content { max-height: 0; overflow: hidden; transition: max-height 0.6s cubic-bezier(0.4, 0, 0.2, 1); background: #000; border-radius: 0 0 8px 8px; }
        .video-content.expanded { max-height: 580px; }
        .video-box { position: relative; padding-bottom: 56.25%; height: 0; }
        .video-box iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }

        .tabs-nav { width: 92%; max-width: 950px; margin: 0 auto; display: flex; background: #f0f0f0; border-radius: 8px 8px 0 0; border-bottom: 3px solid var(--primary); overflow-x: auto; scrollbar-width: none; }
        .tab-btn { flex: 1; padding: 16px 20px; border: none; background: none; cursor: pointer; font-weight: 700; color: var(--secondary); white-space: nowrap; font-size: 0.85rem; transition: 0.2s; }
        .tab-btn.active { background: var(--primary); color: white; }

        .tab-panel { width: 92%; max-width: 950px; margin: 0 auto 60px; background: white; padding: 45px; border-radius: 0 0 8px 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); box-sizing: border-box; }
        .content-pane { display: none; }
        .content-pane.active { display: block; animation: fadeIn 0.5s ease; }

        .sanskrit { color: #d35400; font-style: italic; font-weight: 600; background: var(--accent-soft); padding: 2px 6px; border-radius: 4px; }
        h2 { color: var(--primary); border-left: 5px solid var(--primary); padding-left: 18px; font-size: 1.4rem; margin-bottom: 25px; }
        p { line-height: 1.8; font-size: 1.05rem; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 850px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; height: auto; border-right: none; border-bottom: 2px solid var(--primary); }
            #dynamic-links { display: flex; padding: 0; }
            .nav-item { border-left: none; border-bottom: none; border-right: 1px solid rgba(255,255,255,0.05); padding: 12px 20px; min-width: 140px; }
            .nav-item.active { border-bottom: 4px solid var(--primary); }
            .tab-panel { padding: 25px; }
        }
    </style>
</head>
<body>

    <nav class="sidebar">
        <div class="sidebar-brand">VIṢṆU SAHASRANĀMAM</div>
        <div id="dynamic-links"></div>
    </nav>

    <main class="content-wrapper">
        <header><h1 id="main-title">Loading...</h1></header>
        
        <div class="video-container">
            <button class="video-toggle-btn" onclick="toggleVideo()">
                <span>▶ Watch Discourse Video</span>
                <span id="toggleChevron">▼</span>
            </button>
            <div id="videoCollapsible" class="video-content">
                <div class="video-box"><iframe id="ytPlayer" allowfullscreen></iframe></div>
            </div>
        </div>

        <nav class="tabs-nav">
            <button class="tab-btn active" onclick="switchTab(this, 'part1')">Vedic Theory</button>
            <button class="tab-btn" onclick="switchTab(this, 'part2')">The Stotra's Birth</button>
            <button class="tab-btn" onclick="switchTab(this, 'part3')">Greatness & Form</button>
        </nav>

        <section class="tab-panel">
            <article id="part1" class="content-pane active">
                <h2>The Three Guṇas & Structure of the Vedas</h2>
                <p>The discourse begins by explaining the three types of <span class="sanskrit">guṇas</span> residing in every individual: <span class="sanskrit">Sattva</span>, <span class="sanskrit">Rajas</span>, and <span class="sanskrit">Tamas</span>.</p>
            </article>
            </section>
    </main>

    <script src="../course-sidebar.js"></script>
    <script>
        window.onload = () => initPortal("Day 2");

        function switchTab(btn, paneId) {
            document.querySelectorAll('.content-pane').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(paneId).classList.add('active');
            btn.classList.add('active');
        }

        function toggleVideo() {
            const content = document.getElementById('videoCollapsible');
            const chevron = document.getElementById('toggleChevron');
            const iframe = document.getElementById('ytPlayer');

            if (content.classList.contains('expanded')) {
                content.classList.remove('expanded');
                chevron.innerHTML = '▼';
                iframe.src = ""; 
            } else {
                iframe.src = `https://www.youtube.com/embed/${window.currentVideoId}?autoplay=1`;
                content.classList.add('expanded');
                chevron.innerHTML = '▲';
            }
        }
    </script>
</body>
</html>
