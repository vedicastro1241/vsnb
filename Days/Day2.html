<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day 2 - Pūrvāṅgam: Vighna-Nivāraṇa</title>
    <style>
        :root { 
            --primary: #e67e22; --secondary: #2c3e50; --sidebar-bg: #1a252f; 
            --bg: #fdfaf6; --card-bg: #ffffff; --text-main: #34495e; --accent-soft: #fcf3ea;
        }

        body { font-family: 'Segoe UI', Roboto, sans-serif; margin: 0; display: flex; height: 100vh; background: var(--bg); color: var(--text-main); overflow: hidden; }

        /* Sidebar Fixes */
        .sidebar { width: 300px; background: var(--sidebar-bg); color: white; display: flex; flex-direction: column; flex-shrink: 0; }
        .sidebar-brand { padding: 25px 20px; font-weight: bold; background: rgba(0,0,0,0.2); border-bottom: 1px solid rgba(255,255,255,0.1); }
        #dynamic-links { flex-grow: 1; overflow-y: auto; padding: 10px 0; }
        
        .nav-item { display: block; padding: 15px 20px; color: rgba(255,255,255,0.6); text-decoration: none; border-left: 4px solid transparent; transition: 0.2s; }
        .nav-item:hover { background: rgba(255,255,255,0.05); color: #fff; }
        .nav-item.active { background: rgba(230, 126, 34, 0.15); color: var(--primary); border-left-color: var(--primary); font-weight: 600; }
        .day-num { font-size: 0.75rem; display: block; opacity: 0.7; margin-bottom: 2px; }

        /* Content Shell */
        .content-wrapper { flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; }
        header { background: white; padding: 25px 40px; border-bottom: 1px solid #ddd; position: sticky; top: 0; z-index: 10; }
        header h1 { margin: 0; font-size: 1.5rem; color: var(--secondary); }

        /* Video Section */
        .video-container { width: 90%; max-width: 950px; margin: 20px auto; }
        .video-toggle-btn { width: 100%; background: var(--secondary); color: white; padding: 15px; border: none; border-radius: 8px; cursor: pointer; display: flex; justify-content: space-between; font-weight: bold; }
        .video-content { max-height: 0; overflow: hidden; transition: max-height 0.5s ease-out; background: #000; border-radius: 0 0 8px 8px; }
        .video-content.expanded { max-height: 560px; border: 1px solid #000; }
        .video-box { position: relative; padding-bottom: 56.25%; height: 0; }
        .video-box iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }

        /* Tabs & Content */
        .tabs-nav { width: 90%; max-width: 950px; margin: 0 auto; display: flex; background: #eee; border-radius: 8px 8px 0 0; border-bottom: 3px solid var(--primary); overflow-x: auto; }
        .tab-btn { flex: 1; padding: 15px; border: none; background: none; cursor: pointer; font-weight: bold; color: var(--secondary); white-space: nowrap; font-size: 0.85rem; }
        .tab-btn.active { background: var(--primary); color: white; }
        .tab-panel { width: 90%; max-width: 950px; margin: 0 auto 50px; background: white; padding: 40px; border-radius: 0 0 8px 8px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); box-sizing: border-box; }
        .content-pane { display: none; }
        .content-pane.active { display: block; animation: fadeIn 0.4s; }

        .sanskrit { color: #d35400; font-style: italic; font-weight: 600; background: var(--accent-soft); padding: 2px 5px; border-radius: 4px; }
        h2 { color: var(--primary); border-left: 4px solid var(--primary); padding-left: 15px; font-size: 1.3rem; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; height: auto; }
            #dynamic-links { display: flex; }
            .nav-item { border-left: none; border-bottom: 3px solid transparent; }
            .nav-item.active { border-bottom-color: var(--primary); }
        }
    </style>
</head>
<body>

    <nav class="sidebar">
        <div class="sidebar-brand">Viṣṇu Sahasranāmam Portal</div>
        <div id="dynamic-links"></div>
    </nav>

    <main class="content-wrapper">
        <header><h1 id="main-title">Loading Day...</h1></header>
        
        <div class="video-container">
            <button class="video-toggle-btn" onclick="toggleVideo()">
                <span>▶ Watch Discourse</span>
                <span id="toggleChevron">▼</span>
            </button>
            <div id="videoCollapsible" class="video-content">
                <div class="video-box"><iframe id="ytPlayer" allowfullscreen></iframe></div>
            </div>
        </div>

        <nav class="tabs-nav">
            <button class="tab-btn active" onclick="switchTab(this, 'part1')">Vedic Theory</button>
            <button class="tab-btn" onclick="switchTab(this, 'part2')">The Stotra's Birth</button>
            <button class="tab-btn" onclick="switchTab(this, 'part3')">Greatness & Form</button>
        </nav>

        <section class="tab-panel">
            <article id="part1" class="content-pane active">
                <h2>The Three Guṇas & Structure of the Vedas</h2>
                <p>The discourse begins by explaining the three types of <span class="sanskrit">guṇas</span>...</p>
            </article>
            </section>
    </main>

    <script src="../course-sidebar.js"></script>
    <script>
        // Init: This line pulls the Title and Video ID from course-sidebar.js
        window.onload = () => initPortal("Day 2");

        function switchTab(btn, paneId) {
            document.querySelectorAll('.content-pane').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(paneId).classList.add('active');
            btn.classList.add('active');
        }

        function toggleVideo() {
            const content = document.getElementById('videoCollapsible');
            const chevron = document.getElementById('toggleChevron');
            const iframe = document.getElementById('ytPlayer');

            if (content.classList.contains('expanded')) {
                content.classList.remove('expanded');
                chevron.innerHTML = '▼';
                iframe.src = ""; 
            } else {
                // Pulled from master file
                iframe.src = `https://www.youtube.com/embed/${window.currentVideoId}?autoplay=1`;
                content.classList.add('expanded');
                chevron.innerHTML = '▲';
            }
        }
    </script>
</body>
</html>
