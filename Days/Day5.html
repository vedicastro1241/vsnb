<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Day 5 - The Divine Architecture: Dhyāna and the Cosmic Form</title>
    <style>
        :root { 
            --primary: #e67e22; 
            --secondary: #2c3e50; 
            --sidebar-bg: #1a252f; 
            --bg: #fdfaf6; 
            --card-bg: #ffffff;
            --text-main: #34495e;
            --accent-soft: #fcf3ea;
        }

        body { font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; margin: 0; display: flex; height: 100vh; background: var(--bg); color: var(--text-main); overflow: hidden; }

        /* Sidebar Placeholder - Handled by JS */
        .sidebar { width: 300px; background: var(--sidebar-bg); color: white; display: flex; flex-direction: column; flex-shrink: 0; box-shadow: 4px 0 10px rgba(0,0,0,0.1); }
        
        /* Content Area */
        .content-wrapper { flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; scroll-behavior: smooth; }
        header { background: white; padding: 30px 40px; border-bottom: 1px solid #ddd; position: sticky; top: 0; z-index: 100; }
        header h1 { margin: 0; font-size: 1.6rem; color: var(--secondary); font-weight: 700; }

        /* Video Section */
        .video-container { width: 90%; max-width: 950px; margin: 25px auto; }
        .video-toggle-btn {
            width: 100%; background: var(--secondary); color: white; padding: 15px 25px; border: none; border-radius: 8px;
            cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-weight: bold; transition: 0.3s;
        }
        .video-toggle-btn:hover { background: #34495e; }
        .video-content { max-height: 0; overflow: hidden; transition: max-height 0.5s ease-out; background: #000; border-radius: 0 0 12px 12px; }
        .video-content.expanded { max-height: 600px; margin-top: -5px; }
        .video-box { position: relative; padding-bottom: 56.25%; height: 0; }
        .video-box iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }

        /* Tabs Navigation */
        .tabs-nav { max-width: 950px; margin: 0 auto; display: flex; background: #eee; border-radius: 8px 8px 0 0; border-bottom: 3px solid var(--primary); flex-wrap: wrap; width: 90%; }
        .tab-btn { flex: 1; min-width: 150px; padding: 15px; border: none; background: none; cursor: pointer; font-weight: bold; color: var(--secondary); font-size: 0.85rem; transition: 0.2s; }
        .tab-btn.active { background: var(--primary); color: white; }

        /* Tab Content Panel */
        .tab-panel { max-width: 950px; margin: 0 auto 50px; background: var(--card-bg); padding: 40px; border-radius: 0 0 8px 8px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); width: 90%; box-sizing: border-box; }
        .content-pane { display: none; }
        .content-pane.active { display: block; animation: fadeIn 0.5s ease; }

        /* Readable Elements */
        h2 { color: var(--primary); font-size: 1.4rem; margin-top: 0; border-left: 4px solid var(--primary); padding-left: 15px; margin-bottom: 20px; }
        h3 { color: var(--secondary); margin-top: 30px; font-size: 1.15rem; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        p { line-height: 1.8; font-size: 1.05rem; margin-bottom: 1.5rem; text-align: justify; }
        .sanskrit { color: #d35400; font-style: italic; font-weight: 600; font-family: 'Georgia', serif; background: var(--accent-soft); padding: 2px 5px; border-radius: 4px; }
        .highlight-box { background: var(--accent-soft); border-left: 5px solid var(--primary); padding: 20px; margin: 20px 0; border-radius: 0 8px 8px 0; }
        
        table { width: 100%; border-collapse: collapse; margin: 20px 0; font-size: 0.95rem; }
        th { background-color: var(--secondary); color: white; padding: 12px; text-align: left; }
        td { padding: 12px; border: 1px solid #eee; vertical-align: top; }
        
        ul, ol { padding-left: 20px; margin-bottom: 20px; }
        li { margin-bottom: 12px; line-height: 1.6; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 768px) { 
            body { flex-direction: column; } 
            .sidebar { width: 100%; height: auto; flex-direction: row; overflow-x: auto; } 
            .tab-panel { padding: 20px; }
            .tab-btn { min-width: 120px; font-size: 0.75rem; }
        }
    </style>
</head>
